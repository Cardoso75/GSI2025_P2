<html lang="pt-PT">
<!-- 	Passagem de valores entre páginas
	utilizando forms pode-se passar valores introduzidos pelo utilizador entre páginas
	utilzando a sintaxe METHOD="GET" os valores do formularios são passados como parte do URL para a página constante de valor do atributo ACTION
	ver o ficheiro "JSPassingValues_tabela.htm" para  ver o modo de recuperar os valores passados entre paginas
-->
	<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>uso de Javascript para validação de formulario</title>
	
		<style type="text/css">
<!--
			#frmNome{color:				blue;
					 text-decoration: 	none;
		 			 text-transform:	lowercase;
					 font-family: 		verdana;
					 font-size: 		14
					}
					
			#frmMail{color:				blue;
					 text-decoration: 	none;
		 			 text-transform:	lowercase;
					 font-family: 		verdana;
					 font-size: 		14
					}

			#status{color:				black;
					 text-decoration: 	none;
		 			 text-transform:	lowercase;
					 font-family: 		verdana;
					 font-size: 		10
					}
-->
		</Style>

	
	<script type="text/javascript">
	function verPreenche(campo){
//função para verificar se um dado campo de preenchimento obrigatorio está preenchido
		if (campo.value==null||campo.value==""){
//			alert("vazio");
			return false;
			}
//verifica-se se o campo está vazio ou se tem uma string nula
		else{
//			alert("preenchido");
			return true;
			}
	}
	
	function validarMail(endereco){
// utiliza-se as mesmas regras do exemplo JSValidMail
		var posAt=endereco.value.indexOf("@");
		var posPonto=endereco.value.lastIndexOf(".");
		if (posAt<1||posPonto-posAt<2||posPonto>=endereco.value.length-1){
			return false;
			}
		else{
			return true;
			}
	}

	function validarForm(formulario){
		var valido=true;
		var txtStatus="";
		if (verPreenche(formulario.nome)==false){
//o campo do nome não está preenchido, alerta-se o utilizador				
			formulario.nome.focus();
			document.getElementById('frmNome').style.color='red';
			txtStatus=txtStatus + "Nome nao esta preenchido<br>";
			valido=false;
			}
		else{
//o campo do nome está preenchido, repoem-se o formato original
			document.getElementById('frmNome').style.color='blue';
			}

			if (verPreenche(formulario.email)==false){
//o endereço de mail não está preenchido, alerta-se o utilizador				
			txtStatus=txtStatus + "Mail nao esta preenchido<br>";
			document.getElementById('frmMail').style.color='red';
			valido=false;
			}
		else{
			if (validarMail(formulario.email)==false){
//o endereço não é valido, alerta-se o utilizador					
				formulario.email.focus();					
				document.getElementById('frmMail').style.color='red';
				txtStatus=txtStatus + "Endereço de mail invalido<br>";
				valido=false;
				}
			else{
//o endereço de mail está preenchido e é valido, repoem-se o formato original
				document.getElementById('frmMail').style.color='blue';
				}
			}

			if (!valido){
				document.getElementById('status').innerHTML="<strong>Verifique preenchimento do formulario</strong><br>"+txtStatus+"*Campos de Preenchimento obrigatorio";
//a manipulação de conteudos via JavaScript	permite a inclusão de tags de HTML
			}
			return valido;
		}
	</script>
	</head>

	<body>
		<form action="JSPassingValues_tabela.htm" onsubmit="return validarForm(this);" method="get">
			<table align="center">
				<tr id="frmNome">
					<td align="right" width="75">Nome: </td>
<!-- 'this' refere-se ao objecto identificado na TAG, i.e., ao FORM -->
					<td align="left"><input type="text" name="nome" size="30" placeholder="Introduza o seu nome"></td>
					<td align="left" width="25">*</td>
				</tr>
				<tr id="frmMail" >
					<td align="right">Email: </td>
<!-- 'this' refere-se ao objecto identificado na TAG, i.e., ao FORM -->
					<td align="left"><input type="password" name="email" size="30" placeholder="Introduza o seu email"></td>
					<td align="left" width="25">*</td>
				</tr>
				<tr>
					<td id="status" colspan="3">* preenchimeto obrigatorio</td>
				</tr>
				<tr>
					<td colspan="3" align="center"><input type="submit" value="Continuar »"></td>
				</tr>
			</table>
		</form>
	</body>
</html>
